; Uncomment and configure mode https://xdebug.org/docs/all_settings#xdebug.mode
zend_extension=xdebug.so
xdebug.client_port=9003
; Use 'trigger' (not 'yes'): with 'yes', every PHP process - including each cfg.php
; in post_configure - tries to connect to the debugger on startup and BLOCKS when no
; IDE is listening (max_execution_time=0 means it waits forever, hanging container
; startup). 'trigger' only debugs when a trigger is present (XDEBUG_TRIGGER env or the
; IDE's session marker), so debugging still works on demand without stalling boot.
xdebug.start_with_request=trigger
xdebug.log=/tmp/xdebug.log
xdebug.client_host=host.docker.internal
xdebug.mode=off ;Enable with XDEBUG_MODE
;xdebug.mode=coverage
auto_prepend_file=/var/www/html/xdebug_filter.php
